worker_processes auto;

events {
    worker_connections 2048;
}

http {
    # --- Rate Limiting Zones ---------------------------------------------------
    # Batasi request per IP: 20 req/detik
    limit_req_zone  $binary_remote_addr zone=api_rate:10m rate=20r/s;

    # Batasi koneksi simultan per IP: maks 30 koneksi
    limit_conn_zone $binary_remote_addr zone=api_conn:10m;

    # Respons saat rate limit terlampaui: 429 Too Many Requests
    limit_req_status  429;
    limit_conn_status 429;

    # --- Logging ---------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # --- Load Balancer - Upstream Cluster --------------------------------------
    upstream backend_cluster {
        # least_conn: kirim ke backend dengan koneksi aktif paling sedikit
        least_conn;

        server app1:80 max_fails=3 fail_timeout=10s;
        #server app2:3000 max_fails=3 fail_timeout=10s;
        #server app3:3000 max_fails=3 fail_timeout=10s;

        keepalive 32;
    }

    # --- Server Block ----------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Sembunyikan versi Nginx
        server_tokens off;

        # Health-check endpoint (tanpa rate limit)
        location /health {
            proxy_pass         http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log off;
        }

        # API endpoint utama
        location /api/ {
            # Rate limit: burst 40 req ditampung, kelebihan langsung ditolak
            limit_req  zone=api_rate burst=40 nodelay;
            limit_conn api_conn 30;

            proxy_pass         http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeout
            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;

            # Tampilkan backend mana yang melayani request (debugging)
            add_header X-Upstream-Addr   $upstream_addr         always;
            add_header X-Response-Time   $upstream_response_time always;
            add_header X-Rate-Limit-Info "rate=20r/s burst=40"  always;
        }

        # Root endpoint
        location / {
            limit_req  zone=api_rate burst=20 nodelay;
            limit_conn api_conn 30;

            proxy_pass         http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            add_header X-Upstream-Addr $upstream_addr always;
        }

        # Custom error pages
        error_page 429 /rate_limit.json;
        location = /rate_limit.json {
            default_type application/json;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please slow down."}';
        }

        error_page 502 503 504 /gateway_error.json;
        location = /gateway_error.json {
            default_type application/json;
            return 503 '{"error":"Service Unavailable","message":"All backend instances are currently unavailable."}';
        }
    }
}
