services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring
    depends_on:
      - node-exporter
      - blackbox-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=mailpit:1025
      - GF_SMTP_SKIP_VERIFY=true
      - GF_SMTP_FROM_ADDRESS=alert@valet-service.com
      - GF_SMTP_FROM_NAME=Grafana Alerting
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitoring
    depends_on:
      - prometheus
      - mailpit

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - monitoring

  # Blackbox Exporter: probe HTTP endpoint dan deteksi non-2xx response
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml
    networks:
      - monitoring

  # mock-api: go-httpbin mendukung /status/{code} untuk simulasi error HTTP
  mock-api:
    image: mccutchen/go-httpbin:latest
    container_name: mock-api
    ports:
      - "8080:8080"
    networks:
      - monitoring

  # Mailpit: Menangkap email alerting untuk pengetesan
  mailpit:
    image: axllent/mailpit:latest
    container_name: balivit_mailpit
    ports:
      - "1025:1025"   # SMTP port
      - "8025:8025"   # Web UI port
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge